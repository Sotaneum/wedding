<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="description" content="%VITE_META_DESCRIPTION%" />
    <meta name="keywords" content="%VITE_META_KEYWORDS%" />
    <meta name="author" content="%VITE_META_AUTHOR%" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_OG_SITE_NAME%" />
    <meta property="og:title" content="%VITE_OG_TITLE%" />
    <meta property="og:description" content="%VITE_META_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_OG_IMAGE%" />
    <meta property="og:image:width" content="%VITE_OG_IMAGE_WIDTH%" />
    <meta property="og:image:height" content="%VITE_OG_IMAGE_HEIGHT%" />
    <meta property="og:url" content="%VITE_OG_URL%" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_OG_TITLE%" />
    <meta name="twitter:description" content="%VITE_META_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_OG_IMAGE%" />
    <meta name="twitter:image:width" content="%VITE_OG_IMAGE_WIDTH%" />
    <meta name="twitter:image:height" content="%VITE_OG_IMAGE_HEIGHT%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=%VITE_KAKAO_JS_KEY%&libraries=clusterer"
    ></script>
    <script
      src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.7/kakao.min.js"
      integrity="sha384-tJkjbtDbvoxO+diRuDtwRO9JXR7pjWnfjfRn5ePUpl7e7RJCxKCwwnfqUAdXh53p"
      crossorigin="anonymous"
    ></script>
    <title>%VITE_TITLE%</title>
    <style>
      #sakura {
        overflow-x: hidden;
        width: 100vw;
        max-width: 100vw;
        position: fixed;
        height: 100%;
        pointer-events: none;
        z-index: 20;
      }
      .sakura {
        z-index: 200;
      }
    </style>
  </head>
  <body>
    <script>
      Kakao.init("%VITE_KAKAO_JS_KEY%");
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("%VITE_ENABLE_SAKURA%" === "true") {
        var sakuraRoot = document.createElement("div");
        sakuraRoot.id = "sakura";
        document.body.appendChild(sakuraRoot);

        var sakuraStyle = document.createElement("link");
        sakuraStyle.rel = "stylesheet";
        sakuraStyle.href = "%VITE_OG_URL%/sakura.min.css";
        document.head.appendChild(sakuraStyle);

        var sakuraScript = document.createElement("script");
        sakuraScript.src = "%VITE_OG_URL%/sakura.min.js";
        sakuraScript.onload = function () {
          if (window.Sakura) {
            try {
              var sakura = new window.Sakura("#sakura", { lifeTime: 0 });
              sakura.start();
            } catch {}
          }
        };
        document.body.appendChild(sakuraScript);
      }
    </script>
  </body>
</html>
